name: Redeploy Fail2Ban via Portainer GitOps
#ToDo:
# create the mount points and automount
# then rescan files if the database isn't intact.

on:
  push:
    branches:
      - main
      - '**'
    paths:
      - 'fail2ban/**'
      - '.github/workflows/fail2ban-redeploy.yml'
  workflow_call:
    inputs:
      host_machine:
        required: true
        type: string 
  workflow_dispatch:
    inputs:
      host_machine:
        required: true
        type: string 
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      host_machine: ${{ inputs.host_machine || 'e7270-server' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Write SSH key to file
        run: |
          echo "${{ secrets.SSH_KEY_E7270 }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Install WireGuard
        run: |
          sudo apt-get install -y wireguard || (sudo apt-get update && sudo apt-get install -y wireguard)  

      - name: Write WireGuard config
        run: |
          cat > wg0.conf << EOF
          [Interface]
          PrivateKey = ${{ secrets.WG_PRIVATE_KEY }}
          Address = 10.5.5.5/32
          DNS = 10.5.5.1
          MTU = 1250

          [Peer]
          PublicKey = ${{ secrets.WG_PUBLIC_KEY }}
          PresharedKey = ${{ secrets.WG_PRESHARED_KEY }}
          AllowedIPs = 192.168.0.0/24, 145.241.244.229/32
          Endpoint = ${{ vars.WG_ENDPOINT }}:51820
          PersistentKeepalive = 25
          EOF

      - name: Bring up VPN
        run: |
          for i in $(seq 1 5); do
            echo "Attempt $i/5: bringing up WireGuard..."
            if sudo wg-quick up ./wg0.conf; then
              echo "WireGuard up successfully"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "WireGuard failed after 5 attempts"
              exit 1
            fi
            echo "Failed, waiting 10s before retry..."
            sudo ip link delete dev wg0 2>/dev/null || true
            sleep 10
          done
          sudo wg show

      - name: Create fail2ban directories on host
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              ${{ vars.E7270_USER }}@${{ vars.E7270_IP }} \
              "mkdir -p /opt/stacks/fail2ban/data/action.d \
                        /opt/stacks/fail2ban/data/filter.d \
                        /opt/stacks/fail2ban/data/jail.d \
                        /opt/stacks/fail2ban/data/scripts \
                        /opt/stacks/fail2ban/custom-cont-init.d; \"
               sudo chown -R ${{ vars.E7270_USER }}:${{ vars.E7270_USER }} /opt/stacks/fail2ban/data/"          
      - name: Copy config files to host
        run: |
          rsync -avz --checksum \
            -e "ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key" \
            fail2ban/data/ \
            ${{ vars.E7270_USER }}@${{ vars.E7270_IP }}:/opt/stacks/fail2ban/data/
          rsync -avz --checksum \
            -e "ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key" \
            fail2ban/custom-cont-init.d/ \
            ${{ vars.E7270_USER }}@${{ vars.E7270_IP }}:/opt/stacks/fail2ban/custom-cont-init.d/

      - name: Set permissions on scripts
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              ${{ vars.E7270_USER }}@${{ vars.E7270_IP }} \
              "sudo chown -R ${{ vars.E7270_USER }}:${{ vars.E7270_USER }} /opt/stacks/fail2ban/data/; \
                sudo chmod -R a+rX /opt/stacks/fail2ban/data/; \
                chmod -R +x /opt/stacks/fail2ban/custom-cont-init.d/; \
                chmod -R +x /opt/stacks/fail2ban/data/scripts/"

      - name: Authenticate to Portainer
        id: auth
        run: |
          RESPONSE=$(curl -X POST "${{ vars.RPI4_IP }}:83/api/auth" \
            -H "Content-Type: application/json" \
            -d '{
                 "Username":"${{ vars.APP_USER }}", 
                 "Password":"${{ secrets.APP_PASSWORD }}"
                }')
          TOKEN=$(echo "$RESPONSE" | jq -r '.jwt')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get Portainer EndpointId
        id: endpoint
        env:
          HOST_MACHINE: ${{ inputs.host_machine || 'e7270-server' }}
        run: |
          echo "Looking for endpoint with name: $HOST_MACHINE"
          RESPONSE=$(curl -s -X GET "http://${{ vars.RPI4_IP }}:83/api/endpoints" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          ENDPOINT_ID=$(echo "$RESPONSE" | jq -r --arg host_machine "$host_machine" '.[] | select(.Name==$host_machine) | .Id')
          echo "endpoint_id=$ENDPOINT_ID" >> $GITHUB_OUTPUT

      - name: Get Stack ID (if exists)
        id: get_stack_id
        run: |
          STACKS=$(curl --fail -s -X GET "http://${{ vars.RPI4_IP }}:83/api/stacks" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" || echo "[]")

          # Filter by both Name AND EndpointId
          STACK_ID=$(echo "$STACKS" | jq -r '.[] | select(.Name=="fail2ban" and .EndpointId==${{ steps.endpoint.outputs.endpoint_id }}) | .Id')
          
          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "Stack not found for this endpoint."
            echo "stack_id=0" >> $GITHUB_OUTPUT
          else
            echo "Stack found with ID: $STACK_ID" 
            echo "stack_id=$STACK_ID" >> $GITHUB_OUTPUT
          fi

      - name: Get stack webhook token
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        id: get_webhook
        run: |
          WEBHOOK_TOKEN=$(curl -s \
            --max-time 10 \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "http://192.168.0.2:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
            | jq -r '.AutoUpdate.Webhook')

          echo "Webhook token: $WEBHOOK_TOKEN"
          echo "webhook_token=$WEBHOOK_TOKEN" >> $GITHUB_OUTPUT          

      - name: Generate UUID
        if: ${{ steps.get_stack_id.outputs.stack_id == '0' }}
        id: uuid
        run: |
          echo "uuid=$(uuidgen)" >> $GITHUB_OUTPUT

      - name: Create Stack from GitHub
        if: ${{ steps.get_stack_id.outputs.stack_id == '0' }}
        run: |

          OCI_KEY_BASE64=$(echo "${{ secrets.NETWORKUPDATERSA_API_KEY }}" | base64 -w 0)

          echo "Creating stack from GitHub..."
          RESPONSE=$(curl -v -s -S -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/create/standalone/repository?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
          -H "Content-Type: application/json" \
          -d '{
               "Name": "fail2ban",
               "RepositoryURL": "https://github.com/liamj-f/homelab-setup",
               "RepositoryReferenceName": "${{ github.ref }}",
               "ComposeFile": "fail2ban/fail2ban-compose.yml",
               "RepositoryAuthentication": false,
               "AutoUpdate": {
                              "forcePullImage": true,
                              "forceUpdate": true,
                              "Webhook": "${{ steps.uuid.outputs.uuid }}"
                             },
               "Env": [
                                    {"name":"OCI_USER",        "value":"${{ vars.OCID_NETWORK_UPDATER_SA_USER }}"},
                                    {"name":"OCI_FINGERPRINT",  "value":"${{ vars.OCID_NETWORK_UPDATER_SA_FINGERPRINT }}"},
                                    {"name":"OCI_TENANCY",      "value":"${{ vars.OCID_TENANT }}"},
                                    {"name":"OCI_KEY_CONTENT_BASE64", "value":"'"$OCI_KEY_BASE64"'"},
                                    {
                                    "name":"WAF_BLOCKLIST_ID",
                                    "value":"${{ vars.OCID_WAF_BLOCKLIST }}"
                                    }
                       ],
               "Prune": true,
               "StackFileVersion": "3"
              }')

            echo "API Response: $RESPONSE"
            echo "stack_response=$RESPONSE" >> $GITHUB_OUTPUT

 
      - name: Update Stack Environment Variables
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        run: |
            OCI_KEY_BASE64=$(echo "${{ secrets.NETWORKUPDATERSA_API_KEY }}" | base64 -w 0)

            RESPONSE=$(curl -s -i -v --max-time 300 -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}/git?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{
                  "AutoUpdate": {
                          "forcePullImage": true,
                          "forceUpdate": true,
                          "Webhook": "${{ steps.get_webhook.outputs.webhook_token }}"
                          },
                  "PullImage": false,
                  "RepositoryReferenceName": "${{ github.ref }}",
                  "repositoryAuthentication": false,
                              "Env": [
                                    {"name":"OCI_USER",        "value":"${{ vars.OCID_NETWORK_UPDATER_SA_USER }}"},
                                    {"name":"OCI_FINGERPRINT",  "value":"${{ vars.OCID_NETWORK_UPDATER_SA_FINGERPRINT }}"},
                                    {"name":"OCI_TENANCY",      "value":"${{ vars.OCID_TENANT }}"},
                                    {"name":"OCI_KEY_CONTENT_BASE64", "value":"'"$OCI_KEY_BASE64"'"}
                                      ],
                  "Prune": false
                  }'  )

              echo "API Response: $RESPONSE" 

      - name: Redeploy Stack using webhook
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        run: |
          RESPONSE=$(curl -s -i -v --max-time 300 -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/webhooks/${{ steps.get_webhook.outputs.webhook_token }}?pullimage=true" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" )

          echo "API Response: $RESPONSE"
   
      - name: Bring down VPN
        if: always()
        run: |
          sudo wg-quick down ./wg0.conf
          sudo wg show   
