      - name: Create admin user in GrampsWeb
        run: |  
            ADMIN_TOKEN=$(curl -Ss -X POST https://${{ steps.node_config.outputs.ssh_host }}/api/token/create_owner/ \
                -H 'Content-Type: application/json' \
                -d '{}' \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")

            curl -Ss -X POST https://${{ steps.node_config.outputs.ssh_host }}/api/users/admin/create_owner/ \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H 'Content-Type: application/json' \
              -d '{
                "password":   "${{ secrets.APP_PASSWORD }}",
                "email":      "${{ secrets.APP_EMAIL }}",
                "username":   "${{ secrets.APP_USER }}"
                  }'

#      - name: Create user in GrampsWeb
#        uses: appleboy/ssh-action@v1.2.5
#        with:
#          host: ${{ steps.node_config.outputs.ssh_host }}
#          username: ${{ steps.node_config.outputs.ssh_user }}
#          key_path: /tmp/deploy_key
#          script: |
#            docker exec grampsweb sh -c 'python3 -m gramps_webapi user add --role 5 ${{vars.app_user}} ${{ secrets.app_password }}'

      - name: Login as Admin and get access token
        id: gw_auth
        run: |
          TOKEN=$(curl -Ss -X POST https://${{ steps.node_config.outputs.ssh_host }}:88/api/token/ \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"${{ secrets.APP_PASSWORD }}"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Create a new tree
        id: create_tree
        run: |
          TREE_ID=$(curl -Ss -X POST https://${{ steps.node_config.outputs.ssh_host }}:88/api/trees/ \
            -H "Authorization: Bearer ${{ steps.gw_auth.outputs.token }}" \
            -H 'Content-Type: application/json' \
            -d '{"name":"James-Fagg"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "tree_id=$TREE_ID" >> $GITHUB_OUTPUT

      - name: Attach admin to tree
        run: |
          curl -Ss -X PUT "https://${{ steps.node_config.outputs.ssh_host }}:88/api/users/admin/" \
            -H "Authorization: Bearer ${{ steps.gw_auth.outputs.token }}" \
            -H 'Content-Type: application/json' \
            -d '{"tree":"${{ steps.create_tree.outputs.tree_id }}"}'


      - name: Bring down VPN
        if: always()
        run: |
          sudo wg-quick down ./wg0.conf
          sudo wg show   
