name: Redeploy GrampsWeb via Portainer GitOps
#ToDo:
# create the mount points and automount
# then rescan files if the database isn't intact.

on:
  push:
    branches:
      - main
      - '**'
    paths:
      - 'grampsweb/**'
      - '.github/workflows/grampsweb-deploy.yml'
  workflow_call:
    inputs:
      host_machine:
        required: true
        type: string 
      domain:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      host_machine:
        required: true
        type: string 
      domain:
        required: true
        type: string   
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      host_machine: ${{ inputs.host_machine || 'e7270-server' }}
      domain: ${{ inputs.domain || '14monarch.james-fagg.uk' }}
    steps:
      - name: Set node config
        id: node_config
        run: |
            echo "ssh_host=${{ vars.E7270_IP }}" >> $GITHUB_OUTPUT
            echo "ssh_user=${{ vars.E7270_USER }}" >> $GITHUB_OUTPUT
            echo "ssh_key<<EOF_KEY" >> $GITHUB_OUTPUT
            echo "${{ secrets.SSH_KEY_E7270 }}" >> $GITHUB_OUTPUT
            echo "EOF_KEY" >> $GITHUB_OUTPUT

      - name: Write SSH key to file
        run: |
          echo "${{ steps.node_config.outputs.ssh_key }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key


      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install WireGuard
        run: |
          sudo apt-get install -y wireguard || (sudo apt-get update && sudo apt-get install -y wireguard)  

      - name: Write WireGuard config
        run: |
          cat > wg0.conf << EOF
          [Interface]
          PrivateKey = ${{ secrets.WG_PRIVATE_KEY }}
          Address = 10.5.5.5/32
          DNS = 10.5.5.1
          MTU = 1250

          [Peer]
          PublicKey = ${{ secrets.WG_PUBLIC_KEY }}
          PresharedKey = ${{ secrets.WG_PRESHARED_KEY }}
          AllowedIPs = 192.168.0.0/24, 145.241.244.229/32
          Endpoint = ${{ vars.WG_ENDPOINT }}:51820
          PersistentKeepalive = 25
          EOF

      - name: Bring up VPN
        run: |
          for i in $(seq 1 5); do
            echo "Attempt $i/5: bringing up WireGuard..."
            if sudo wg-quick up ./wg0.conf; then
              echo "WireGuard up successfully"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "WireGuard failed after 5 attempts"
              exit 1
            fi
            echo "Failed, waiting 10s before retry..."
            sudo ip link delete dev wg0 2>/dev/null || true
            sleep 10
          done
          sudo wg show
          
      - name: Override system DNS resolver
        run: |
          sudo rm /etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf
            
      - name: Authenticate to Portainer
        id: auth
        run: |
          RESPONSE=$(curl -X POST "${{ vars.RPI4_IP }}:83/api/auth" \
            -H "Content-Type: application/json" \
            -d '{
                 "Username":"${{ vars.APP_USER }}", 
                 "Password":"${{ secrets.APP_PASSWORD }}"
                }')
          TOKEN=$(echo "$RESPONSE" | jq -r '.jwt')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get Portainer EndpointId
        id: endpoint
        env:
          HOST_MACHINE: ${{ inputs.host_machine || 'e7270-server' }}
        run: |
          echo "Looking for endpoint with name: $HOST_MACHINE"
          RESPONSE=$(curl -Ss -X GET "http://${{ vars.RPI4_IP }}:83/api/endpoints" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          ENDPOINT_ID=$(echo "$RESPONSE" | jq -r --arg host_machine "$host_machine" '.[] | select(.Name==$host_machine) | .Id')
          echo "endpoint_id=$ENDPOINT_ID" >> $GITHUB_OUTPUT

      - name: Get Stack ID (if exists)
        id: get_stack_id
        run: |
          STACKS=$(curl --fail -Ss -X GET "http://${{ vars.RPI4_IP }}:83/api/stacks" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" || echo "[]")

          # Filter by both Name AND EndpointId
          STACK_ID=$(echo "$STACKS" | jq -r '.[] | select(.Name=="grampsweb" and .EndpointId==${{ steps.endpoint.outputs.endpoint_id }}) | .Id')
          
          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "Stack not found for this endpoint."
            echo "stack_id=0" >> $GITHUB_OUTPUT
          else
            echo "Stack found with ID: $STACK_ID" 
            echo "stack_id=$STACK_ID" >> $GITHUB_OUTPUT
          fi

      - name: Get stack webhook token
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        id: get_webhook
        run: |
          WEBHOOK_TOKEN=$(curl -Ss \
            --max-time 10 \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "http://192.168.0.2:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
            | jq -r '.AutoUpdate.Webhook')

          echo "Webhook token: $WEBHOOK_TOKEN"
          echo "webhook_token=$WEBHOOK_TOKEN" >> $GITHUB_OUTPUT          
          
      - name: Generate UUID
        if: ${{ steps.get_stack_id.outputs.stack_id == '0' }}
        id: uuid
        run: |
          echo "uuid=$(uuidgen)" >> $GITHUB_OUTPUT

      - name: Create Stack from GitHub
        if: ${{ steps.get_stack_id.outputs.stack_id == '0' }}
        run: |
          echo "Creating stack from GitHub..."
          RESPONSE=$(curl -v -Ss -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/create/standalone/repository?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
          -H "Content-Type: application/json" \
          -d '{
               "Name": "grampsweb",
               "RepositoryURL": "https://github.com/liamj-f/homelab-setup",
               "RepositoryReferenceName": "${{ github.ref }}",
               "ComposeFile": "grampsweb/grampsweb-compose.yml",
               "RepositoryAuthentication": false,
               "AutoUpdate": {
                              "forcePullImage": true,
                              "forceUpdate": true,
                              "Webhook": "${{ steps.uuid.outputs.uuid }}"
                             },
               "Prune": true,
               "StackFileVersion": "3",
               "Env": [
                        {"name": "svc_grampsweb_password", "value": "${{ secrets.SVC_GRAMPSWEB_PASSWORD }}"},
                        {"name": "grampsweb_secret_key", "value": "${{ secrets.GRAMPSWEB_SECRET_KEY }}"}
                      ]

              }')
            echo "API Response: $RESPONSE"
            echo "stack_response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Update Environment Variables
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        run: |
          curl -Ss -X PUT "http://${{ vars.RPI4_IP }}:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}/git/redeploy?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
          -H "Content-Type: application/json" \
            -d '{
                  "AutoUpdate": {
                          "forcePullImage": true,
                          "forceUpdate": true,
                          "Webhook": "${{ steps.get_webhook.outputs.webhook_token }}"
                          },               
               "PullImage": true,
               "RepositoryReferenceName": "${{ github.ref }}",
               "RepositoryAuthentication": false,
               "Prune": true,
               "Env": [
                        {"name": "svc_grampsweb_password", "value": "${{ secrets.SVC_GRAMPSWEB_PASSWORD }}"},
                        {"name": "grampsweb_secret_key", "value": "${{ secrets.GRAMPSWEB_SECRET_KEY }}"}
                      ]
              }'          

#      - name: Redeploy Stack using webhook
