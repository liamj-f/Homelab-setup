name: Redeploy Keepalived, Pihole and Nginx via Portainer GitOps

on:
  push:
    branches:
      - main
      - '**'
    paths:
      - '.github/workflows/keepalived-deploy.yml'
      - 'keepalived/**'
  workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host_machine: [rpi4-server, e7270-server]
      max-parallel: 1
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set node config
        id: node_config
        run: |
          if [ "${{ matrix.host_machine }}" = "rpi4-server" ]; then
            echo "ssh_host=${{ vars.RPI4_IP }}" >> $GITHUB_OUTPUT
            echo "ssh_user=${{ vars.RPI4_USER }}" >> $GITHUB_OUTPUT
            echo "ssh_key<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.SSH_KEY_RPI4 }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "keepalived_priority=110" >> $GITHUB_OUTPUT
            echo "keepalived_state=MASTER" >> $GITHUB_OUTPUT
            echo "keepalived_interface=eth0" >> $GITHUB_OUTPUT
            echo "rsync_target_host=${{ vars.E7270_IP}}" >> $GITHUB_OUTPUT
            echo "rsync_target_user=${{ vars.E7270_USER }}" >> $GITHUB_OUTPUT
            echo "rsync_target_key<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.SSH_KEY_E7270 }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.host_machine }}" = "e7270-server" ]; then
            echo "ssh_host=${{ vars.E7270_IP}}" >> $GITHUB_OUTPUT
            echo "ssh_user=${{ vars.E7270_USER }}" >> $GITHUB_OUTPUT
            echo "ssh_key<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.SSH_KEY_E7270 }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "keepalived_priority=100" >> $GITHUB_OUTPUT
            echo "keepalived_state=BACKUP" >> $GITHUB_OUTPUT
            echo "keepalived_interface=wlp1s0" >> $GITHUB_OUTPUT
            echo "rsync_target_host=${{ vars.RPI4_IP }}" >> $GITHUB_OUTPUT
            echo "rsync_target_user=${{ vars.RPI4_USER }}" >> $GITHUB_OUTPUT
            echo "rsync_target_key<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.SSH_KEY_RPI4 }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Write SSH key to file
        run: |
          echo "${{ steps.node_config.outputs.ssh_key }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Render keepalived config
        run: |
          export KEEPALIVED_VIRTUAL_IP="${{ vars.KEEPALIVED_IP }}"
          export KEEPALIVED_AUTH_PASS="${{ secrets.MYSQL_ROOT_PASSWORD }}"
          export KEEPALIVED_PRIORITY="${{ steps.node_config.outputs.keepalived_priority }}"
          export MASTER_OR_BACKUP_STATE="${{ steps.node_config.outputs.keepalived_state }}"
          export KEEPALIVED_INTERFACE="${{ steps.node_config.outputs.keepalived_interface }}"
          envsubst < keepalived/keepalived.conf.template > keepalived/keepalived.conf

      - name: Render notify.sh
        run: |
          export PRIMARY_IP="${{ steps.node_config.outputs.ssh_host }}"
          export PIHOLE_WEBPASSWORD="${{ secrets.APP_PASSWORD }}"
          envsubst '${PRIMARY_IP} ${PIHOLE_WEBPASSWORD}' < keepalived/notify.sh.template > keepalived/notify.sh

      - name: Render rathole client toml
        run: |
          export LJFCLOUD_IP="${{ vars.LJFCLOUD_IP }}"
          export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
          export KEEPALIVED_VIRTUAL_IP="${{ vars.KEEPALIVED_IP }}"
          envsubst < keepalived/rathole-client.toml.template > keepalived/rathole-client.toml

      - name: Install WireGuard
        run: |
          sudo apt-get install -y wireguard || (sudo apt-get update && sudo apt-get install -y wireguard)  

      - name: Write WireGuard config
        run: |
          cat > wg0.conf << EOF
          [Interface]
          PrivateKey = ${{ secrets.WG_PRIVATE_KEY }}
          Address = 10.5.5.5/32
          DNS = 10.5.5.1
          MTU = 1250

          [Peer]
          PublicKey = ${{ secrets.WG_PUBLIC_KEY }}
          PresharedKey = ${{ secrets.WG_PRESHARED_KEY }}
          AllowedIPs = 192.168.0.0/24, 145.241.244.229/32
          Endpoint = ${{ vars.WG_ENDPOINT }}:51820
          PersistentKeepalive = 25
          EOF

      - name: Bring up VPN
        run: |
          for i in $(seq 1 5); do
            echo "Attempt $i/5: bringing up WireGuard..."
            if sudo wg-quick up ./wg0.conf; then
              echo "WireGuard up successfully"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "WireGuard failed after 5 attempts"
              exit 1
            fi
            echo "Failed, waiting 10s before retry..."
            sudo ip link delete dev wg0 2>/dev/null || true
            sleep 10
          done
          sudo wg show

      - name: Override system DNS resolver
        run: |
          sudo rm /etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf

      - name: Copy configs to host
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              ${{ steps.node_config.outputs.ssh_user }}@${{ steps.node_config.outputs.ssh_host }} \
              "sudo mkdir -p /opt/stacks/keepalived && sudo chown -R ${{ steps.node_config.outputs.ssh_user }}:${{ steps.node_config.outputs.ssh_user }} /opt/stacks"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            keepalived/keepalived.conf \
            keepalived/notify.sh \
            keepalived/rathole-client.toml \
            keepalived/http_top.conf \
            ${{ steps.node_config.outputs.ssh_user }}@${{ steps.node_config.outputs.ssh_host }}:/opt/stacks/keepalived/

      - name: Set permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.node_config.outputs.ssh_host }}
          username: ${{ steps.node_config.outputs.ssh_user }}
          key_path: /tmp/deploy_key
          script: |
            chmod a+rx /opt/stacks/keepalived/notify.sh
            ls -la /opt/stacks/keepalived/

#      - name: Write key files
#        run: |
#          printf '%s' "${{ steps.node_config.outputs.rsync_target_key }}" > /tmp/rsync_key
#          chmod 600 /tmp/rsync_key
#          printf '%s' "${{ steps.node_config.outputs.rsync_target_key }}" > /tmp/rsync_target_key
#          chmod 600 /tmp/rsync_target_key
#
#      - name: Deploy rsync SSH key to host
#        uses: appleboy/ssh-action@master
#        with:
#          host: ${{ steps.node_config.outputs.ssh_host }}
#          username: ${{ steps.node_config.outputs.ssh_user }}
#          key_path: /tmp/deploy_key
#          script: |
#            mkdir -p ~/.ssh
#            chmod 700 ~/.ssh
#            printf '%s' '${{ steps.node_config.outputs.rsync_target_key }}' > ~/.ssh/rsync_id
#            chmod 600 ~/.ssh/rsync_id

      - name: Authenticate to Portainer
        id: auth
        run: |
          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -X POST "${{ vars.RPI4_IP }}:83/api/auth" \
            -H "Content-Type: application/json" \
            -d '{
                 "Username":"${{ vars.APP_USER }}", 
                 "Password":"${{ secrets.APP_PASSWORD }}"
                }')
          TOKEN=$(echo "$RESPONSE" | jq -r '.jwt')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get Portainer EndpointId
        id: endpoint
        env:
          host_machine: ${{ matrix.host_machine || 'rpi4-server' }}
        run: |
          echo "Looking for endpoint with name: $host_machine"
          RESPONSE=$(curl -s -X GET "http://${{ vars.RPI4_IP }}:83/api/endpoints" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          ENDPOINT_ID=$(echo "$RESPONSE" | jq -r --arg host_machine "$host_machine" '.[] | select(.Name==$host_machine) | .Id')
          echo "endpoint_id=$ENDPOINT_ID" >> $GITHUB_OUTPUT

      - name: See if Nginx network exists
        id: check_network
        run: |
          NETWORKS=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s -X GET "http://${{ vars.RPI4_IP }}:83/api/endpoints/${{ steps.endpoint.outputs.endpoint_id }}/docker/networks" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          
          if echo "$NETWORKS" | jq -e '.[] | select(.Name=="nginx_network")' > /dev/null; then
            echo "Network found."
            echo "network_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Network not found."
            echo "network_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create nginx_network
        if: steps.check_network.outputs.network_exists == 'false'
        run: |
          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s -X POST "http://${{ vars.RPI4_IP }}:83/api/endpoints/${{ steps.endpoint.outputs.endpoint_id }}/docker/networks/create" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
          -H "Content-Type: application/json" \
          -d '{
               "Name": "nginx_network",
               "Driver": "bridge",
               "CheckDuplicate": true,
               "Options": {
                 "com.docker.network.enable_ipv6": "false"
                          }
              }'
              )

      - name: Get Stack ID (if exists)
        id: get_stack_id
        run: |
          STACKS=$(curl --fail -s -X GET "http://${{ vars.RPI4_IP }}:83/api/stacks" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" || echo "[]")

          # Filter by both Name AND EndpointId
          STACK_ID=$(echo "$STACKS" | jq -r '.[] | select(.Name=="keepalived" and .EndpointId==${{ steps.endpoint.outputs.endpoint_id }}) | .Id')
          
          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "Stack not found for this endpoint."
            echo "stack_id=0" >> $GITHUB_OUTPUT
          else
            echo "Stack found with ID: $STACK_ID" 
            echo "stack_id=$STACK_ID" >> $GITHUB_OUTPUT
          fi

      - name: Get stack webhook token
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        id: get_webhook
        run: |
          WEBHOOK_TOKEN=$(curl -s \
            --max-time 10 \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "http://192.168.0.2:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
            | jq -r '.AutoUpdate.Webhook')

          echo "Webhook token: $WEBHOOK_TOKEN"
          echo "webhook_token=$WEBHOOK_TOKEN" >> $GITHUB_OUTPUT

      - name: Generate UUID
        if: ${{ steps.get_stack_id.outputs.stack_id == '0' }}
        id: uuid
        run: |
          echo "uuid=$(uuidgen)" >> $GITHUB_OUTPUT

      - name: Create Stack from GitHub
        if: ${{ steps.get_stack_id.outputs.stack_id == '0' }}
        run: |
          echo "Creating stack from GitHub..."
          
          CREATE_STACK_PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg ssh_user "${{ steps.node_config.outputs.ssh_user }}" \
            --arg app_password "${{ secrets.APP_PASSWORD }}" \
            --arg primary_ip "${{ steps.node_config.outputs.ssh_host }}" \
            --arg secondary_ip "${{ steps.node_config.outputs.rsync_target_host }}" \
            --arg nginx_email "${{ vars.NGINX_EMAIL }}" \
            --arg hostname "${{ matrix.host_machine }}" \
            --arg webhook "${{ steps.uuid.outputs.uuid }}" \
            '{
            Name: "keepalived",
            RepositoryURL: "https://github.com/liamj-f/homelab-setup",
            RepositoryReferenceName: $ref,
            ComposeFile: "keepalived/keepalived-compose.yml",
            RepositoryAuthentication: false,
            AutoUpdate: {
                          "forcePullImage": true,
                          "forceUpdate": true,
                          "Webhook": $webhook
                          },
              Env: [
                {name: "SSH_USER",            value: $ssh_user},
                {name: "PIHOLE_WEBPASSWORD",  value: $app_password},
                {name: "PRIMARY_IP",          value: $primary_ip},
                {name: "SECONDARY_IP",        value: $secondary_ip},
                {name: "INITIAL_ADMIN_EMAIL", value: $nginx_email},
                {name: "HOSTNAME",            value: $hostname}
              ],
            Prune: true,
            StackFileVersion: "3"
          }')
          

          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -v -s -S -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/create/standalone/repository?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
          -H "Content-Type: application/json" \
          -d "$CREATE_STACK_PAYLOAD")

          echo "API Response: $RESPONSE"

      - name: Update Stack Environment Variables
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        run: |
            UPDATE_STACK_PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg ssh_user "${{ steps.node_config.outputs.ssh_user }}" \
            --arg app_password "${{ secrets.APP_PASSWORD }}" \
            --arg primary_ip "${{ steps.node_config.outputs.ssh_host }}" \
            --arg secondary_ip "${{ steps.node_config.outputs.rsync_target_host }}" \
            --arg hostname "${{ matrix.host_machine }}" \
            --arg nginx_email "${{ vars.NGINX_EMAIL }}" \
            --arg webhook "${{ steps.get_webhook.outputs.webhook_token}}" \
            '{
              AutoUpdate: {
                    ForcePullImage: true,
                    ForceUpdate: true,
                    Webhook: $webhook
                    },
              PullImage: true,
              RepositoryReferenceName: $ref,
              repositoryAuthentication: false,
              Env: [
                {name: "SSH_USER",            value: $ssh_user},
                {name: "PIHOLE_WEBPASSWORD",  value: $app_password},
                {name: "PRIMARY_IP",          value: $primary_ip},
                {name: "SECONDARY_IP",        value: $secondary_ip},
                {name: "INITIAL_ADMIN_EMAIL", value: $nginx_email},
                {name: "HOSTNAME",            value: $hostname}
              ],
              Prune: true
              }')

            RESPONSE=$(curl -s -i -v --max-time 300 -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}/git?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$UPDATE_STACK_PAYLOAD")

            echo "API Response: $RESPONSE" 


      - name: Redeploy Stack using webhook
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        run: |
          RESPONSE=$(curl -s -i -v --max-time 300 -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/webhooks/${{ steps.get_webhook.outputs.webhook_token }}?pullimage=true" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" )

          echo "API Response: $RESPONSE"

#      - name: Update Stack
#        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
#        run: |
#            UPDATE_STACK_PAYLOAD=$(jq -n \
#            --arg ref "${{ github.ref }}" \
#            --arg ssh_user "${{ steps.node_config.outputs.ssh_user }}" \
#            --arg app_password "${{ secrets.APP_PASSWORD }}" \
#            --arg primary_ip "${{ steps.node_config.outputs.ssh_host }}" \
#            --arg secondary_ip "${{ steps.node_config.outputs.rsync_target_host }}" \
#            --arg hostname "${{ matrix.host_machine }}" \
#            --arg nginx_email "${{ vars.NGINX_EMAIL }}" \
#            '{
#              PullImage: true,
#              RepositoryReferenceName: $ref,
#              repositoryAuthentication: false,
#              Env: [
#                {name: "SSH_USER",            value: $ssh_user},
#                {name: "PIHOLE_WEBPASSWORD",  value: $app_password},
#                {name: "PRIMARY_IP",          value: $primary_ip},
#                {name: "SECONDARY_IP",        value: $secondary_ip},
#                {name: "INITIAL_ADMIN_EMAIL", value: $nginx_email},
#                {name: "HOSTNAME",            value: $hostname}
#              ],
#              Prune: true
#              }')
#
#            echo "Redeploying stack ${{ steps.get_stack_id.outputs.stack_id }} on endpoint ${{ steps.endpoint.outputs.endpoint_id }}"
#
#            RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s -X PUT \
#              "http://${{ vars.RPI4_IP }}:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}/git/redeploy?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
#              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
#              -H "Content-Type: application/json" \
#              -d "$UPDATE_STACK_PAYLOAD")
#
#            echo "Response: $RESPONSE"       

      - name: Trigger notify.sh to set correct state
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              ${{ steps.node_config.outputs.ssh_user }}@${{ steps.node_config.outputs.ssh_host }} \
              "CURRENT_STATE=\$(cat /tmp/keepalived_state 2>/dev/null || echo 'BACKUP') && \
              echo \"Current state: \$CURRENT_STATE\" && \
              sudo /opt/stacks/keepalived/notify.sh INSTANCE VI_1 \$CURRENT_STATE"

#      - name: Fix NPM database permissions
#        uses: appleboy/ssh-action@master
#        with:
#          host: ${{ steps.node_config.outputs.ssh_host }}
#          username: ${{ steps.node_config.outputs.ssh_user }}
#          key_path: /tmp/deploy_key
#          script: |
#            sudo chmod 664 /var/lib/docker/volumes/nginx_data/_data/database.sqlite
#            sudo chmod 775 /var/lib/docker/volumes/nginx_data/_data/

      - name: Copy NGINX XFF config into NPM container
        if: ${{ steps.node_config.outputs.keepalived_state == 'MASTER' }}
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              ${{ steps.node_config.outputs.ssh_user }}@${{ steps.node_config.outputs.ssh_host }} \
              "docker exec nginx-proxy-manager mkdir -p /data/nginx/custom && \
               docker cp /opt/stacks/keepalived/http_top.conf nginx-proxy-manager:/data/nginx/custom/http_top.conf && \
               docker exec nginx-proxy-manager nginx -s reload"

      - name: Pihole Api Auth
        id: pihole_auth
        run: |
          sleep 20
          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s -X POST "http://${{ steps.node_config.outputs.ssh_host }}:82/api/auth" \
              -H "Content-Type: application/json" \
              -d '{
                  "password": "${{ secrets.APP_PASSWORD }}"
                  }' )

          CSRF=$(echo "$RESPONSE" | jq -r '.session.csrf')
          SID=$(echo "$RESPONSE" | jq -r '.session.sid')
          echo "sid=$SID" >> $GITHUB_OUTPUT
          echo "csrf=$CSRF" >> $GITHUB_OUTPUT         
          
      - name: Add DNS records to Pihole via API
        # should add wg0 back in as interface here "eth0,wg0
        # removed "active": true, from the dhcp part as keepalived will handle on transistion to master
        run: |
          cat <<EOF > pihole_config.json
          {
              "config":{
                  "dns":{
                      "piholePTR":"Hostname",
                      "domain": {
                                  "name": "",
                                  "local": true
                                },
                      "upstreams": [
                                    "1.1.1.1",
                                    "8.8.8.8"
                                    ],
                      "interface": "eth0", 
                      "listeningMode": "single",
                      "revServers":["true,192.168.0.0/24,192.168.0.1,local"],
                      "hosts":[
                              "${{ vars.KEEPALIVED_IP }} tplink.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} pihole.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} pihole1.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} pihole2.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} nginx.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} nginx1.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} nginx2.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} portainer.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} nextcloud.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} adminer.14monarch.james-fagg.uk",
                              "${{ vars.KEEPALIVED_IP }} whoami.14monarch.james-fagg.uk"
                              ]
                           },                          
                  "dhcp": {
                        "start": "192.168.0.10",
                        "end": "192.168.0.254",
                        "router": "192.168.0.1",
                        "netmask": "",
                        "leaseTime": "2h",
                        "ipv6": false,
                        "rapidCommit": false,
                        "multiDNS": false,
                        "logging": false,
                        "ignoreUnknownClients": false,
                        "hosts": [
                                "dc:a6:32:c8:bb:41,${{ vars.RPI4_IP }},rpi4-server,infinite",
                                "b8:27:eb:3a:5d:2a,${{ vars.RPI0_IP }},rpi0-server,infinite",
                                "3c:6a:a7:87:f4:0b,${{ vars.E7270_IP }},e7270-server,infinite"
                                 ]
                          },
                  "misc": {
                          "dnsmasq_lines": ["dhcp-option=6,${{ vars.KEEPALIVED_IP }}"]
                          }  
                    }
                }
          EOF
                                    
          curl --retry 3 --retry-delay 5 --retry-all-errors -X PATCH "http://${{ steps.node_config.outputs.ssh_host }}:82/api/config" \
          -H "X-FTL-SID: ${{ steps.pihole_auth.outputs.sid }}" \
          -H "X-FTL-CSRF: ${{ steps.pihole_auth.outputs.csrf }}" \
          -H 'accept: application/json' \
          -H 'content-type: application/json' \
          -d "@pihole_config.json"

      - name: Wait for Pi-hole DB ready
        run: |
          for i in $(seq 1 12); do
            RESPONSE=$(curl -s "http://${{ steps.node_config.outputs.ssh_host }}:82/api/groups" \
              -H "X-FTL-SID: ${{ steps.pihole_auth.outputs.sid }}" \
              -H "X-FTL-CSRF: ${{ steps.pihole_auth.outputs.csrf }}" \
              -H 'accept: application/json' || true)
            echo "Attempt $i/12: $RESPONSE"
            if echo "$RESPONSE" | jq -e '.groups' > /dev/null 2>&1; then
              echo "Pi-hole gravity DB is ready"
              exit 0
            fi
            echo "DB not ready, waiting 10s..."
            sleep 10
          done
          echo "Pi-hole gravity DB not ready after 2 minutes"
          exit 1

      - name: Add Blocklists to Pihole via API
        run: |
          curl --retry 3 --retry-delay 5 --retry-all-errors -X POST "http://${{ steps.node_config.outputs.ssh_host }}:82/api/lists?type=block" \
          -H "X-FTL-SID: ${{ steps.pihole_auth.outputs.sid }}" \
          -H "X-FTL-CSRF: ${{ steps.pihole_auth.outputs.csrf }}" \
          -H 'accept: application/json' \
          -H 'content-type: application/json' \
          -d '{
              "address": [
                          "https://v.firebog.net/hosts/Easylist.txt",
                          "https://media.githubusercontent.com/media/zachlagden/Pi-hole-Optimized-Blocklists/refs/heads/main/lists/advertising.txt",
                          "https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts"
                          ],
              "comment": "Added via API",
              "groups": [0],
              "enabled": true
              }'

      - name: Update Gravity via API
        run: |
          curl --retry 3 --retry-delay 5 --retry-all-errors  -X POST "http://${{ steps.node_config.outputs.ssh_host }}:82/api/action/gravity" \
          -H "X-FTL-SID: ${{ steps.pihole_auth.outputs.sid }}" \
          -H "X-FTL-CSRF: ${{ steps.pihole_auth.outputs.csrf }}" \
          -H 'accept: text/plain' \
          -H 'content-type: application/json' \

      - name: Get Bypass Group ID
        id: bypass_group
        run: |
          RAW=$(curl -s "http://${{ steps.node_config.outputs.ssh_host }}:82/api/groups" \
            -H "X-FTL-SID: ${{ steps.pihole_auth.outputs.sid }}" \
            -H "X-FTL-CSRF: ${{ steps.pihole_auth.outputs.csrf }}" \
            -H 'accept: application/json')
          echo "Raw response: $RAW"
          GROUP_ID=$(echo "$RAW" | jq -r '(.groups // [])[] | select(.name == "bypass") | .id')
          echo "group_id=$GROUP_ID" >> $GITHUB_OUTPUT

      - name: Create Bypass Group in Pihole
        if: steps.bypass_group.outputs.group_id == ''
        run: |
            RESPONSE=$(curl -s --retry 3 --retry-delay 5 --retry-all-errors -X POST "http://${{ steps.node_config.outputs.ssh_host }}:82/api/groups" \
              -H "X-FTL-SID: ${{ steps.pihole_auth.outputs.sid }}" \
              -H "X-FTL-CSRF: ${{ steps.pihole_auth.outputs.csrf }}" \
              -H 'accept: application/json' \
              -H 'content-type: application/json' \
              -d '{"name":"bypass","comment":"Bypass group - no blocklists","enabled":true}')
            echo "Response: $RESPONSE"

      - name: Add Phone to Bypass Group
        run: |
          curl --retry 3 --retry-delay 5 --retry-all-errors -X POST "http://${{ steps.node_config.outputs.ssh_host }}:82/api/clients" \
          -H "X-FTL-SID: ${{ steps.pihole_auth.outputs.sid }}" \
          -H "X-FTL-CSRF: ${{ steps.pihole_auth.outputs.csrf }}" \
          -H 'accept: application/json' \
          -H 'content-type: application/json' \
          -d '{
              "client": "B8:A8:25:5E:17:7A",
              "comment": "HJ-F phone - bypass group",
              "groups": [${{ steps.bypass_group.outputs.group_id }}]
              }'
          
      - name: End Pihole API Session
        run: |
          curl --retry 3 --retry-delay 5 --retry-all-errors -X DELETE "http://${{ steps.node_config.outputs.ssh_host }}:82/api/auth" \
          -H "X-FTL-SID: ${{ steps.pihole_auth.outputs.sid }}" \
          -H "X-FTL-CSRF: ${{ steps.pihole_auth.outputs.csrf }}" \

      - name: Authenticate as nginx user
        id: token
        run: |
          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s -X POST "http://${{ steps.node_config.outputs.ssh_host }}:81/api/tokens" \
            -H "Content-Type: application/json" \
            -d '{
                 "identity":"${{ vars.NGINX_EMAIL }}",
                 "secret":"${{ secrets.APP_PASSWORD }}"
                 }')
        
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Resolve SSL Certificate ID
        id: cert
        run: |
          cert_id=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s \
            -X GET "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/certificates" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" | \
            jq -r --arg d "*.14monarch.james-fagg.uk" '.[] | select(.domain_names[] == $d) | .id' | head -n 1)

          if [ -n "$cert_id" ] && [ "$cert_id" != "null" ]; then
            echo "Found existing cert: $cert_id"
            echo "cert_id=$cert_id" >> $GITHUB_OUTPUT
          else
            echo "No existing cert found."
            echo "cert_id=" >> $GITHUB_OUTPUT
          fi

      - name: Create Certificate
        id: create_cert
        if: ${{ steps.cert.outputs.cert_id == ''}}
        continue-on-error: true
        run: |
          PAYLOAD=$(jq -n \
            --arg domain "$domain" \
            --arg key "${{ secrets.PORKBUN_API_KEY }}" \
            --arg secret "${{ secrets.PORKBUN_API_SECRET }}" \
            '{
              provider: "letsencrypt",
              domain_names: ["*." + $domain, $domain],
              meta: {
                dns_challenge: true,
                dns_provider: "porkbun",
                dns_provider_credentials: ("dns_porkbun_key=" + $key + "\ndns_porkbun_secret=" + $secret),
                propagation_seconds: 120
              }
            }')

          echo "Creating certificate for domains: *.${domain}, ${domain}"

          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -sS \
            -X POST "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/certificates" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -d "$PAYLOAD" \
            -w "\n%{http_code}" || true)

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_STATUS"
          echo "$BODY" | sed -E 's/(dns_porkbun_key=)[^ "]+/\1*****/g; s/(dns_porkbun_secret=)[^ "]+/\1*****/g'

          if [[ "$HTTP_STATUS" =~ ^2 ]]; then
            cert_id=$(echo "$BODY" | jq -r '.id // empty')
            echo "cert_id=$cert_id" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Proxy Hosts 
        run: |
          declare -A hosts
          hosts["tplink.14monarch.james-fagg.uk"]="192.168.0.1:80"
          hosts["nginx.14monarch.james-fagg.uk"]="${{ vars.KEEPALIVED_IP }}:81"
          hosts["nginx1.14monarch.james-fagg.uk"]="${{ vars.RPI4_IP }}:81"
          hosts["nginx2.14monarch.james-fagg.uk"]="${{ vars.E7270_IP }}:81"
          hosts["pihole.14monarch.james-fagg.uk"]="${{ vars.KEEPALIVED_IP }}:82"
          hosts["pihole1.14monarch.james-fagg.uk"]="${{ vars.RPI4_IP }}:82"
          hosts["pihole2.14monarch.james-fagg.uk"]="${{ vars.E7270_IP }}:82"
          hosts["portainer.14monarch.james-fagg.uk"]="${{ vars.RPI4_IP }}:83"
          hosts["nextcloud.14monarch.james-fagg.uk"]="${{ vars.E7270_IP }}:85"
          hosts["adminer.14monarch.james-fagg.uk"]="${{ vars.E7270_IP }}:86"
          hosts["whoami.14monarch.james-fagg.uk","whoami.james-fagg.uk"]="${{ vars.E7270_IP }}:87"
          hosts["familytree.james-fagg.uk"]="${{ vars.E7270_IP }}:88"

          ALL_HOSTS=$(curl -s -X GET "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/proxy-hosts" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}")

          for fqdn in "${!hosts[@]}"; do
            host="${hosts[$fqdn]}"
            host_ip="${host%%:*}"
            host_port="${host##*:}"

            BODY=$(jq -n \
              --arg fqdn "$fqdn" \
              --arg host_ip "$host_ip" \
              --argjson host_port "$host_port" \
              --arg cert_id "${{ steps.cert.outputs.cert_id || steps.create_cert.outputs.cert_id }}" \
              '{
                domain_names: [$fqdn],
                forward_host: $host_ip,
                forward_port: $host_port,
                forward_scheme: "http",
                certificate_id: $cert_id,
                allow_websocket_upgrade: 1,
                ssl_forced: false,
                enabled: true,
                block_exploits: true,
                meta: { letsencrypt_agree: false, dns_challenge: false }
              }')

            EXISTING_ID=$(echo "$ALL_HOSTS" | jq -r --arg d "$fqdn" '.[] | select(.domain_names[] == $d) | .id' | head -n 1)

            if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
              echo "Updating $fqdn (id: $EXISTING_ID)"
              curl --retry 3 --retry-delay 5 --retry-all-errors -s \
                -X PUT "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/proxy-hosts/$EXISTING_ID" \
                -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
                -H "Content-Type: application/json" \
                -d "$BODY" | jq -r '.id // "error"'
            else
              echo "Creating $fqdn"
              curl --retry 3 --retry-delay 5 --retry-all-errors -s \
                -X POST "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/proxy-hosts" \
                -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
                -H "Content-Type: application/json" \
                -d "$BODY" | jq -r '.id // "error"'
            fi
          done

      - name: Set NPM default site
        run: |
            RESPONSE=$(curl -X PUT "http://${{ steps.node_config.outputs.ssh_host }}:81/api/settings/default-site" \
            -H 'Authorization: Bearer ${{ steps.token.outputs.token }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "value": "html",
              "meta": {
                "html": "<body>\n<pre>{ \"code\":\"404\",\"message\":\"No route to host\",\"source\":\"${{ matrix.host_machine }}\" }\n</pre>\n</body>"
              }
              }')

              echo $RESPONSE

      - name: Bring down VPN
        if: always()
        run: |
          sudo wg-quick down ./wg0.conf
          sudo wg show   

