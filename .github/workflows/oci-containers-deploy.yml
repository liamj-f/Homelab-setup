#                                    {"name":"OCI_TENANCY",      "value":"${{ vars.OCID_TENANT }}"},
#                                    {"name":"OCI_CERT_ID",      "value":"${{ vars.OCID_SSL_CERT }}"},
#                                    {"name":"OCI_KEY_CONTENT_BASE64", "value":"'"$OCI_KEY_BASE64"'"},
#                                    {
#                                    "name":"SECURITY_LIST_ID",
#                                    "value":"${{ vars.OCID_SECURITY_LIST }}"
#                                    },
#                                    {
#                                    "name":"NSG_ID",
#                                    "value":"${{ vars.OCID_HOME_TO_VM_NSG }}"
