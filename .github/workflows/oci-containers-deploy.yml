      - name: Copy XFF config to host
        run: |
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            keepalived/http_top.conf \
            ${{ steps.node_config.outputs.ssh_user }}@${{ steps.node_config.outputs.ssh_host }}:/tmp/http_top.conf

      - name: Wait for NPM to be healthy
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              ${{ steps.node_config.outputs.ssh_user }}@${{ steps.node_config.outputs.ssh_host }} \
              "for i in \$(seq 1 25); do
                STATUS=\$(docker inspect --format='{{.State.Health.Status}}' nginx-proxy-manager 2>/dev/null)
                echo \"Attempt \$i/25: NPM health = \$STATUS\"
                if [ \"\$STATUS\" = \"healthy\" ]; then
                  echo \"NPM is healthy\"
                  exit 0
                fi
                sleep 5
              done
              echo \"NPM did not become healthy in time\"
              exit 1"

      - name: Copy NGINX XFF config into NPM container
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              ${{ steps.node_config.outputs.ssh_user }}@${{ steps.node_config.outputs.ssh_host }} \
              "docker exec nginx-proxy-manager mkdir -p /data/nginx/custom && \
               docker cp /tmp/http_top.conf nginx-proxy-manager:/data/nginx/custom/http_top.conf && \
               docker exec nginx-proxy-manager nginx -s reload"

      - name: Authenticate as nginx user
        id: token
        run: |
          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s -X POST "http://${{ steps.node_config.outputs.ssh_host }}:81/api/tokens" \
            -H "Content-Type: application/json" \
            -d '{
                 "identity":"${{ vars.NGINX_EMAIL }}",
                 "secret":"${{ secrets.APP_PASSWORD }}"
                 }')
        
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Resolve SSL Certificate ID
        id: cert
        run: |
          cert_id=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s \
            -X GET "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/certificates" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" | \
            jq -r --arg d "*.$domain" '.[] | select(.domain_names[] == $d) | .id' | head -n 1)

          if [ -n "$cert_id" ] && [ "$cert_id" != "null" ]; then
            echo "Found existing cert: $cert_id"
            echo "cert_id=$cert_id" >> $GITHUB_OUTPUT
          else
            echo "No existing cert found."
            echo "cert_id=" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Proxy Hosts (without cert)
        run: |
          declare -A hosts
          hosts["dovetrek.james-fagg.uk"]="dovetrek-pwa:80"
          hosts["nginx.oci.james-fagg.uk"]="nginx-proxy-manager:81"
          hosts["whoami.14monarch.james-fagg.uk"]="rathole-server:3000"
          hosts["nginx.14monarch.james-fagg.uk"]="rathole-server:3000"

          ALL_HOSTS=$(curl -s -X GET "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/proxy-hosts" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}")

          for fqdn in "${!hosts[@]}"; do
            host="${hosts[$fqdn]}"
            host_ip="${host%%:*}"
            host_port="${host##*:}"

            BODY=$(jq -n \
              --arg fqdn "$fqdn" \
              --arg host_ip "$host_ip" \
              --argjson host_port "$host_port" \
              '{
                domain_names: [$fqdn],
                forward_host: $host_ip,
                forward_port: $host_port,
                forward_scheme: "http",
                ssl_forced: false,
                enabled: true,
                block_exploits: true,
                meta: { letsencrypt_agree: false, dns_challenge: false }
              }')

            EXISTING_ID=$(echo "$ALL_HOSTS" | jq -r --arg d "$fqdn" '.[] | select(.domain_names[] == $d) | .id' | head -n 1)

            if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
              echo "Updating $fqdn (id: $EXISTING_ID)"
              curl --retry 3 --retry-delay 5 --retry-all-errors -s \
                -X PUT "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/proxy-hosts/$EXISTING_ID" \
                -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
                -H "Content-Type: application/json" \
                -d "$BODY" | jq -r '.id // "error"'
            else
              echo "Creating $fqdn"
              curl --retry 3 --retry-delay 5 --retry-all-errors -s \
                -X POST "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/proxy-hosts" \
                -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
                -H "Content-Type: application/json" \
                -d "$BODY" | jq -r '.id // "error"'
            fi
          done

      - name: Create Certificate
        id: create_cert
        if: ${{ steps.cert.outputs.cert_id == '' && steps.node_config.outputs.keepalived_state == 'MASTER' }}
        continue-on-error: true
        run: |
          PAYLOAD=$(jq -n \
            --arg domain "$domain" \
            --arg key "${{ secrets.PORKBUN_API_KEY }}" \
            --arg secret "${{ secrets.PORKBUN_API_SECRET }}" \
            '{
              provider: "letsencrypt",
              domain_names: ["*." + $domain, $domain],
              meta: {
                dns_challenge: true,
                dns_provider: "porkbun",
                dns_provider_credentials: ("dns_porkbun_key=" + $key + "\ndns_porkbun_secret=" + $secret),
                propagation_seconds: 120
              }
            }')

          echo "Creating certificate for domains: *.${domain}, ${domain}"

          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -sS \
            -X POST "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/certificates" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -d "$PAYLOAD" \
            -w "\n%{http_code}" || true)

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_STATUS"
          echo "$BODY" | sed -E 's/(dns_porkbun_key=)[^ "]+/\1*****/g; s/(dns_porkbun_secret=)[^ "]+/\1*****/g'

          if [[ "$HTTP_STATUS" =~ ^2 ]]; then
            cert_id=$(echo "$BODY" | jq -r '.id // empty')
            echo "cert_id=$cert_id" >> $GITHUB_OUTPUT
          fi

      - name: Apply Certificate to Proxy Hosts
        if: ${{ steps.node_config.outputs.keepalived_state == 'MASTER' }}
        run: |
          cert_id="${{ steps.cert.outputs.cert_id }}"
          [ -z "$cert_id" ] && cert_id="${{ steps.create_cert.outputs.cert_id }}"

          if [ -z "$cert_id" ] || [ "$cert_id" = "null" ]; then
            echo "No certificate available — skipping SSL update."
            exit 0
          fi

          echo "Applying cert $cert_id to all proxy hosts..."

          ALL_HOSTS=$(curl -s -X GET "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/proxy-hosts" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}")

          echo "$ALL_HOSTS" | jq -c '.[]' | while read -r proxy; do
            id=$(echo "$proxy" | jq -r '.id')
            fqdn=$(echo "$proxy" | jq -r '.domain_names[0]')

            BODY=$(echo "$proxy" | jq \
              --argjson cert_id "$cert_id" \
              '{
                domain_names: .domain_names,
                forward_scheme: .forward_scheme,
                forward_host: .forward_host,
                forward_port: .forward_port,
                access_list_id: .access_list_id,
                certificate_id: $cert_id,
                ssl_forced: true,
                caching_enabled: .caching_enabled,
                block_exploits: .block_exploits,
                advanced_config: .advanced_config,
                meta: .meta,
                allow_websocket_upgrade: .allow_websocket_upgrade,
                http2_support: .http2_support,
                enabled: .enabled,
                locations: (if .locations == null then [] else .locations end),
                hsts_enabled: .hsts_enabled,
                hsts_subdomains: .hsts_subdomains,
                trust_forwarded_proto: .trust_forwarded_proto
              }')

            echo "Applying cert to $fqdn (id: $id)"
            curl --retry 3 --retry-delay 5 --retry-all-errors -s \
              -X PUT "http://${{ steps.node_config.outputs.ssh_host }}:81/api/nginx/proxy-hosts/$id" \
              -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
              -H "Content-Type: application/json" \
              -d "$BODY" | jq -r '.id // "error"'
          done

      - name: Bring down VPN
        if: always()
        run: |
          sudo wg-quick down ./wg0.conf
          sudo wg show
