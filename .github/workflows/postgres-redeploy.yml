
name: Redeploy Postgres via Portainer GitOps 
on:
  workflow_dispatch:
    inputs:
      host_machine:
        required: true
        type: string 
      domain:
        required: true
        type: string
  workflow_call:
    inputs:
      host_machine:
        required: true
        type: string 
      domain:
        required: true
        type: string       
  push:
    branches:
      - main
      - '**'
    paths:
      - '.github/workflows/postgres-redeploy.yml'    
      - 'postgres/**'
    
jobs:
  add_Postgres_stack:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host_machine: [e7270-server]
      max-parallel: 1
    env:
      host_machine: ${{ inputs.host_machine || 'e7270-server' }}
      domain: ${{ inputs.domain || '14monarch.james-fagg.uk' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Set node config
        id: node_config
        run: |
          if [ "${{ matrix.host_machine }}" = "e7270-server" ]; then
            echo "ssh_host=${{ vars.E7270_IP}}" >> $GITHUB_OUTPUT
            echo "ssh_user=${{ vars.E7270_USER }}" >> $GITHUB_OUTPUT
            echo "ssh_key<<EOF_Key" >> $GITHUB_OUTPUT
            echo "${{ secrets.SSH_KEY_E7270 }}" >> $GITHUB_OUTPUT
            echo "EOF_Key" >> $GITHUB_OUTPUT
          fi

      - name: Install WireGuard
        run: |
          sudo apt-get install -y wireguard || (sudo apt-get update && sudo apt-get install -y wireguard)  
          
      - name: Write WireGuard config
        run: |
          cat > wg0.conf << EOF
          [Interface]
          PrivateKey = ${{ secrets.WG_PRIVATE_KEY }}
          Address = 10.5.5.5/32
          DNS = 10.5.5.1
          MTU = 1250

          [Peer]
          PublicKey = ${{ secrets.WG_PUBLIC_KEY }}
          PresharedKey = ${{ secrets.WG_PRESHARED_KEY }}
          AllowedIPs = 192.168.0.0/24, 145.241.244.229/32
          Endpoint = ${{ vars.WG_ENDPOINT }}:51820
          PersistentKeepalive = 25
          EOF
          
      - name: Bring up VPN on runner
        run: |
          sudo wg-quick up ./wg0.conf
          sudo wg show  

      - name: Override system DNS resolver on runner
        run: |
          sudo rm /etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf
          
      - name: Add host key to known_hosts of runner
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.LJFCLOUD_IP }} >> ~/.ssh/known_hosts

      - name: Prepare Postgres data directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.node_config.outputs.ssh_host }}
          username: ${{ steps.node_config.outputs.ssh_user }}
          key: ${{ steps.node_config.outputs.ssh_key }}
          script: |
            sudo mkdir -p /opt/stacks/postgres/data
            sudo chown -R 999:999 /opt/stacks/postgres/data

      - name: Prepare pgAdmin data directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.node_config.outputs.ssh_host }}
          username: ${{ steps.node_config.outputs.ssh_user }}
          key: ${{ steps.node_config.outputs.ssh_key }}
          script: |
            sudo mkdir -p /opt/stacks/pgadmin
            sudo chown -R 5050:5050 /opt/stacks/pgadmin

      - name: Render SQL files
        run: |
          export APP_USER="${{ vars.APP_USER }}"
          export APP_PASSWORD="${{ secrets.APP_PASSWORD }}"
          export SVC_GRAMPSWEB_PASSWORD="${{ secrets.SVC_GRAMPSWEB_PASSWORD }}"
          export SVC_NEXTCLOUD_PASSWORD="${{ secrets.SVC_NEXTCLOUD_PASSWORD }}"
          envsubst < postgres/database_create.sql > postgres/database_create_rendered.sql

      - name: Copy SQL files to host
        uses: appleboy/scp-action@v0.1.7
        with:   
          host: ${{ steps.node_config.outputs.ssh_host }}
          username: ${{ steps.node_config.outputs.ssh_user }}
          key: ${{ steps.node_config.outputs.ssh_key }}    
          source: postgres/database_create_rendered.sql
          target: /tmp/

      - name: Authenticate to Portainer
        id: auth
        run: |
          RESPONSE=$(curl -X POST "http://${{ vars.RPI4_IP }}:83/api/auth" \
            -H "Content-Type: application/json" \
            -d '{
                 "Username":"${{ vars.APP_USER }}",
                 "Password":"${{ secrets.APP_PASSWORD }}"
                 }')
          TOKEN=$(echo "$RESPONSE" | jq -r '.jwt')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          
      - name: Get Portainer EndpointId
        id: endpoint
        run: |
          RESPONSE=$(curl -s -X GET "http://${{ vars.RPI4_IP }}:83/api/endpoints" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          ENDPOINT_ID=$(echo "$RESPONSE" | jq -r --arg host_machine "$host_machine" '.[] | select(.Name==$host_machine) | .Id')
          echo "endpoint_id=$ENDPOINT_ID" >> $GITHUB_OUTPUT

      - name: See if DB network exists
        id: check_network
        run: |
          NETWORKS=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s -X GET "http://${{ vars.RPI4_IP }}:83/api/endpoints/${{ steps.endpoint.outputs.endpoint_id }}/docker/networks" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          
          if echo "$NETWORKS" | jq -e '.[] | select(.Name=="db_network")' > /dev/null; then
            echo "Network found."
            echo "network_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Network not found."
            echo "network_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create db_network
        if: steps.check_network.outputs.network_exists == 'false'
        run: |
          RESPONSE=$(curl --retry 3 --retry-delay 5 --retry-all-errors -s -X POST "http://${{ vars.RPI4_IP }}:83/api/endpoints/${{ steps.endpoint.outputs.endpoint_id }}/docker/networks/create" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
          -H "Content-Type: application/json" \
          -d '{
               "Name": "db_network",
               "Driver": "bridge",
               "CheckDuplicate": true,
               "Options": {
                 "com.docker.network.enable_ipv6": "false"
                          }
              }'
              )

      - name: Get Stack ID (if exists)
        id: get_stack_id
        run: |
          STACKS=$(curl --fail -s -X GET "http://${{ vars.RPI4_IP }}:83/api/stacks" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" || echo "[]")

          # Filter by both Name AND EndpointId
          STACK_ID=$(echo "$STACKS" | jq -r '.[] | select(.Name=="postgres" and .EndpointId==${{ steps.endpoint.outputs.endpoint_id }}) | .Id')
          
          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "Stack not found for this endpoint."
            echo "stack_id=0" >> $GITHUB_OUTPUT
          else
            echo "Stack found with ID: $STACK_ID"
            echo "stack_id=$STACK_ID" >> $GITHUB_OUTPUT
          fi

      - name: Get stack webhook token
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        id: get_webhook
        run: |
          WEBHOOK_TOKEN=$(curl -s \
            --max-time 10 \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "http://${{ vars.RPI4_IP }}:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
            | jq -r '.AutoUpdate.Webhook')

          echo "Webhook token: $WEBHOOK_TOKEN"
          echo "webhook_token=$WEBHOOK_TOKEN" >> $GITHUB_OUTPUT    

      - name: Generate UUID
        if: ${{ steps.get_stack_id.outputs.stack_id == '0' }}
        id: uuid
        run: |
          echo "uuid=$(uuidgen)" >> $GITHUB_OUTPUT

      - name: Create Stack from GitHub
        if: ${{ steps.get_stack_id.outputs.stack_id == '0' }}
        run: |
          echo "Creating stack from GitHub..."
          RESPONSE=$(curl -v -s -S -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/create/standalone/repository?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
          -H "Content-Type: application/json" \
          -d '{
               "Name": "postgres",
               "RepositoryURL": "https://github.com/liamj-f/homelab-setup",
               "RepositoryReferenceName": "${{ github.ref }}",
               "ComposeFile": "postgres-compose.yml",
               "RepositoryAuthentication": false,
               "AutoUpdate": {
                              "forcePullImage": true,
                              "forceUpdate": true,
                              "Webhook": "${{ steps.uuid.outputs.uuid }}"
                             },
               "Env": [
                       {
                       "name":"POSTGRES_PASSWORD",
                       "value":"${{ secrets.SVC_POSTGRES_PASSWORD }}"
                        },
                       {
                       "name":"PGADMIN_EMAIL",
                       "value":"${{ vars.HOMELAB_EMAIL }}"
                        },
                       {
                       "name":"PGADMIN_PASSWORD",
                       "value":"${{ secrets.APP_PASSWORD }}"
                        }
                     ],
               "Prune": true,
               "StackFileVersion": "3"
              }')

            echo "API Response: $RESPONSE"
            echo "stack_response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Update Stack Environment Variables
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        run: |          
          curl -s -X PUT "http://${{ vars.RPI4_IP }}:83/api/stacks/${{ steps.get_stack_id.outputs.stack_id }}/git?endpointId=${{ steps.endpoint.outputs.endpoint_id }}" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
          -H "Content-Type: application/json" \
          -d '{
               "PullImage": true,
               "RepositoryReferenceName": "${{ github.ref }}",
               "repositoryAuthentication": false,
               "AutoUpdate": {
                              "forcePullImage": true,
                              "forceUpdate": true,
                              "Webhook": "${{ steps.get_webhook.outputs.webhook_token }}"
                             },
               "Env": [
                       {
                       "name":"POSTGRES_PASSWORD",
                       "value":"${{ secrets.SVC_POSTGRES_PASSWORD }}"
                        },
                       {
                       "name":"PGADMIN_EMAIL",
                       "value":"${{ vars.HOMELAB_EMAIL }}"
                        },
                       {
                       "name":"PGADMIN_PASSWORD",
                       "value":"${{ secrets.APP_PASSWORD }}"
                        }
                     ],
               "Prune": true
              }'

      - name: Redeploy Stack using webhook
        if: ${{ steps.get_stack_id.outputs.stack_id != '0' }}
        run: |
          RESPONSE=$(curl -s -i -v --max-time 300 -X POST "http://${{ vars.RPI4_IP }}:83/api/stacks/webhooks/${{ steps.get_webhook.outputs.webhook_token }}?pullimage=true" \
          -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" )

          echo "API Response: $RESPONSE"

      - name: Wait for Postgres container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.node_config.outputs.ssh_host }}
          username: ${{ steps.node_config.outputs.ssh_user }}
          key: ${{ steps.node_config.outputs.ssh_key }}
          script: |
            for i in $(seq 1 12); do
              if docker exec postgres pg_isready -U svc_postgres 2>/dev/null; then
                echo "Postgres is ready"
                exit 0
              fi
              echo "Attempt $i/12: waiting 10s..."
              sleep 10
            done
            echo "Postgres not ready after 2 minutes"
            docker logs postgres --tail 20
            exit 1

      - name: Install locales in Postgres container
        uses: appleboy/ssh-action@v1.2.5
        with: 
          host: ${{ steps.node_config.outputs.ssh_host }}
          username: ${{ steps.node_config.outputs.ssh_user }}
          key: ${{ steps.node_config.outputs.ssh_key }}
          script: |
              docker exec postgres apt-get update
              docker exec postgres apt-get install -y --no-install-recommends locales
              docker exec postgres sed -i '/en_GB.UTF-8/s/^# //' /etc/locale.gen
              docker exec postgres locale-gen
              docker exec postgres bash -c 'rm -rf /var/lib/apt/lists/*'


      - name: Create databases and users
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.node_config.outputs.ssh_host }}
          username: ${{ steps.node_config.outputs.ssh_user }}
          key: ${{ steps.node_config.outputs.ssh_key }}
          capture_stdout: true
          script: |
            docker cp /tmp/postgres/database_create_rendered.sql postgres:/tmp/database_create_rendered.sql
            docker exec postgres psql -U svc_postgres -e -f /tmp/database_create_rendered.sql
            rm -rf /tmp/postgres/


      - name: Bring down VPN
        if: always()
        run: |
          sudo wg-quick down ./wg0.conf
          sudo wg show   
