# NOTE: gramps_db (mounted below at /root/.gramps/grampsdb) must stay
# persistent - it's the only local record of which family tree(s) exist
# and which backend they use. Without it, every redeploy loses track of
# the tree created by grampsweb/bootstrap_owner.py and creates a new one,
# orphaning whatever was written to the previous tree id in Postgres.
services:
  grampsweb: &grampsweb
    image: ghcr.io/gramps-project/grampsweb:26.5.0
    container_name: grampsweb
    restart: always
    ports:
      - "88:5000"  # host:docker
    environment:
      GRAMPSWEB_TREE: "*"
      GRAMPSWEB_SECRET_KEY: ${grampsweb_secret_key}
      GRAMPSWEB_EMAIL_HOST: "smtp.gmail.com"
      GRAMPSWEB_EMAIL_PORT: "587"
      GRAMPSWEB_EMAIL_USE_SSL: "false"
      GRAMPSWEB_EMAIL_USE_STARTTLS: "true"
      GRAMPSWEB_EMAIL_HOST_USER: "${gmail_address}"
      GRAMPSWEB_EMAIL_HOST_PASSWORD: "${gmail_app_password}"
      GRAMPSWEB_DEFAULT_FROM_EMAIL: "${grampsweb_email_address}"
      GRAMPSWEB_OIDC_ENABLED: true
      GRAMPSWEB_OIDC_GOOGLE_CLIENT_ID: "${gcp_oauth_client_id}"
      GRAMPSWEB_OIDC_GOOGLE_CLIENT_SECRET: "${gcp_oauth_client_secret}"
      GRAMPSWEB_OIDC_NAME: "Sign in with Google"        # cosmetic label
      GRAMPSWEB_OIDC_AUTO_REDIRECT: False                 # skip the login page if Google is the only method
      GRAMPSWEB_OIDC_DISABLE_LOCAL_AUTH: False             # force everyone through Google, no local passwords
      GRAMPSWEB_POSTGRES_USER: svc_grampsweb
      GRAMPSWEB_POSTGRES_PASSWORD: ${svc_grampsweb_password}
      GRAMPSWEB_POSTGRES_HOST: postgres
      GRAMPSWEB_POSTGRES_PORT: 5432 
      GRAMPSWEB_NEW_DB_BACKEND: sharedpostgresql
      GRAMPSWEB_MEDIA_PREFIX_TREE: True
      GRAMPSWEB_USER_DB_URI: postgresql://svc_grampsweb:${svc_grampsweb_password}@postgres:5432/grampsweb_users
      GRAMPSWEB_SEARCH_INDEX_DB_URI: postgresql://svc_grampsweb:${svc_grampsweb_password}@postgres:5432/grampsweb_search
      GRAMPSWEB_BASE_URL: "https://familytree.james-fagg.uk"
      GRAMPSWEB_CELERY_CONFIG__broker_url: "redis://grampsweb_redis:6379/0"
      GRAMPSWEB_CELERY_CONFIG__result_backend: "redis://grampsweb_redis:6379/0"
      GRAMPSWEB_RATELIMIT_STORAGE_URI: redis://grampsweb_redis:6379/1
      GUNICORN_CMD_ARGS: >- 
        --access-logfile=/app/logs/access.log 
        --access-logformat='%(h)s %({x-forwarded-for}i)s %(t)s %(r)s %(s)s' 
        --forwarded-allow-ips=192.168.0.2
 
    depends_on:
      - grampsweb_redis
    networks:
      - db_network
    volumes:
      - gramps_thumb_cache:/app/thumbnail_cache  # persist thumbnails
      - gramps_cache:/app/cache  # persist export and report caches
      - gramps_secret:/app/secret  # persist flask secret
      - gramps_db:/root/.gramps/grampsdb  # persist tree registry (name/backend markers, not the data itself)
      - gramps_media:/app/media  # persist media files
      - gramps_tmp:/tmp
      - /opt/stacks/grampsweb/logs:/app/logs

  grampsweb_celery:
    <<: *grampsweb  # YAML merge key copying the entire grampsweb service config
    ports: []
    container_name: grampsweb_celery
    depends_on:
      - grampsweb
      - grampsweb_redis
    command: celery -A gramps_webapi.celery worker --loglevel=INFO --concurrency=2

  grampsweb_redis:
    image: ghcr.io/valkey-io/valkey:9.1.0-alpine
    container_name: grampsweb_redis
    restart: always
    networks:
      - db_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  db_network:
    external: true
    driver: bridge

volumes:
  gramps_thumb_cache:
  gramps_cache:
  gramps_secret:
  gramps_media:
  gramps_tmp:
  gramps_db:
