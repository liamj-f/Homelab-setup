version: "3.8"

services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "85:80"   # Web UI
      - "8443:443"  # HTTPS if you set up TLS
    volumes:
      - /mnt/Nextcloud:/var/www/html/data
      - nextcloud_app_data:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
    networks:
      - nextcloud_network

networks:
  db_network:
    driver: bridge
    external: true    

volumes:
  nextcloud_db_data:
    name: nextcloud_db_data
    external: false
  nextcloud_app_data:
    name: nextcloud_app_data
    
