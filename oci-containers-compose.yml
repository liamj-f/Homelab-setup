version: '3.8'

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    environment:
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD:  ${INITIAL_ADMIN_PASSWORD}
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
      - "81:81"     # Admin UI
    volumes:
      - nginx_data:/data
      - nginx_letsencrypt:/etc/letsencrypt
    networks:
      - nginx_network
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
  oci-cert-updater:
    image: ghcr.io/liamj-f/oci-cert-updater:latest
    container_name: oci-cert-updater
    restart: unless-stopped
    environment:
      - OCI_CERT_ID=${OCI_CERT_ID}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-3600}
      - OCI_USER=${OCI_USER}
      - OCI_FINGERPRINT=${OCI_FINGERPRINT}
      - OCI_TENANCY=${OCI_TENANCY}
      - OCI_REGION=uk-london-1
      - OCI_KEY_CONTENT_BASE64=${OCI_KEY_CONTENT_BASE64}
    volumes:
      - nginx_letsencrypt:/etc/letsencrypt:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  OCI-Dynamic-IP-Updater:
    image: ghcr.io/liamj-f/oci-dynamic-ip-updater:latest
    container_name: oci-dynamic-ip-updater
    restart: unless-stopped
    environment:
      # Comma-separated host:port or host:port_start-port_end entries
      - LIST_ITEMS=${LIST_ITEMS}
      # Hostname to monitor
      # Check interval in seconds (default: 300 = 5 minutes)
      - CHECK_INTERVAL=300
      # OCI Security List ID
      - SECURITY_LIST_ID=${SECURITY_LIST_ID}
      - NSG_ID=${OCID_HOME_TO_VM_NSG}
      # OCI Credentials
      - OCI_USER=${OCI_USER}
      - WAF_ALLOWLIST_ID=${WAF_ALLOWLIST_ID}
      - OCI_FINGERPRINT=${OCI_FINGERPRINT}
      - OCI_TENANCY=${OCI_TENANCY}
      - OCI_REGION=uk-london-1
      - OCI_KEY_CONTENT_BASE64=${OCI_KEY_CONTENT_BASE64}    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    network_mode: host # optional, needed for IPv6 detection
    environment:
    - PUID=1000 # optional
    - PGID=1000 # optional
    - TZ=Etc/UTC # optional
    - SUBDOMAINS=${SUBDOMAIN} # required, comma separated if multiple
    - TOKEN=${DUCKDNS_TOKEN} # required
    - UPDATE_IP=ipv4 # optional: ipv4, ipv6, or both
    - LOG_FILE=false # optional
    volumes:
    - /path/to/duckdns/config:/config # optional
    restart: unless-stopped
  rathole-server:
    image: ghcr.io/rathole-org/rathole:dev
    container_name: rathole-server
    restart: unless-stopped
    ports:
      - "2333:2333"
      - "3000:3000"
    volumes:
      - /opt/stacks/rathole/rathole-server.toml:/app/config.toml
    command: --server /app/config.toml
    networks:
      - nginx_network

volumes:
  nginx_data:
    name: nginx_data
  nginx_letsencrypt:
    name: nginx_letsencrypt
networks:
  nginx_network:
    driver: bridge
    external: true